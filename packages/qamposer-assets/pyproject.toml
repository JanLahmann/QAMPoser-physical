[project]
name = "qamposer-assets"
version = "0.1.0"
description = "Printable asset generator for Entangible — vector ArUco tiles and board mats (SVG -> PDF)."
requires-python = ">=3.11"
dependencies = [
    "cairosvg",
    "qamposer-vision",
]

[project.optional-dependencies]
# Fallback SVG->PDF path when system libcairo is unavailable.
fallback = ["svglib", "reportlab"]
dev = ["pytest"]

[project.scripts]
qamposer-assets = "qamposer_assets.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qamposer_assets"]

[tool.uv.sources]
qamposer-vision = { workspace = true }
