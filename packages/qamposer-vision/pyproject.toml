[project]
name = "qamposer-vision"
version = "0.1.0"
description = "OpenCV/ArUco vision pipeline for Entangible — detects gate tiles and builds @qamposer/react circuits."
requires-python = ">=3.11"
dependencies = [
    "opencv-python-headless>=4.8",
    "numpy",
]

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
qamposer-vision = "qamposer_vision.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qamposer_vision"]
